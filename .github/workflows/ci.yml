name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fail CI on high+ vulns in runtime deps. Dev-only CVEs don't ship to
      # production so they're scanned separately and not enforced.
      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
      - name: npm audit (dev, report-only)
        run: npm audit --audit-level=high || true

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Start server
        run: npm start &
      - name: Wait for server
        run: npx -y wait-on http://localhost:3000 --timeout 60000
      - name: Validate JSON-LD schema
        run: node scripts/validate-schema.mjs
      - name: Run mobile audit
        env:
          CI: "1"
        run: node scripts/shot-all.mjs
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-audit-screenshots
          path: /tmp/mobile-audit
